# Nightly logical backup of the production Postgres (Railway Hobby plan has
# no native backups). Dumps schema + all data EXCEPT document_images rows —
# extracted chart PNGs (~218 MB of the 241 MB database) that can be
# regenerated by re-running summarization against the re-downloadable source
# documents. Everything irreplaceable (summaries, briefings, manual edits,
# users, meetings, editor images) is included, ~23 MB per dump.
#
# Requires repo secret DATABASE_PUBLIC_URL (Railway → Postgres →
# DATABASE_PUBLIC_URL).
#
# Restore:
#   pg_restore --clean --if-exists -d "$TARGET_DATABASE_URL" poolside-<date>.dump
# then re-run summarization with image extraction to repopulate figures.
name: DB backup

on:
  schedule:
    - cron: "30 7 * * *" # daily 07:30 UTC (03:30 ET)
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 18 client (server is PG 18; runner ships older)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-18

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          test -n "$DATABASE_URL" || { echo "DATABASE_PUBLIC_URL secret is not set"; exit 1; }
          /usr/lib/postgresql/18/bin/pg_dump "$DATABASE_URL" \
            --format=custom --compress=9 \
            --exclude-table-data=document_images \
            --file="poolside-$(date -u +%F).dump"
          ls -lh poolside-*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: poolside-db-${{ github.run_id }}
          path: poolside-*.dump
          retention-days: 30
          if-no-files-found: error
