storage_root: ./nepool-materials
lookahead_days: 60
committees:
- name: Markets Committee
  short: MC
  url: https://www.iso-ne.com/committees/markets/markets-committee/calendar
  active: true
- name: Participants Committee
  short: NPC
  url: https://www.iso-ne.com/committees/participants/participants-committee/calendar
  active: true
- name: Reliability Committee
  short: RC
  url: https://www.iso-ne.com/committees/reliability/reliability-committee/calendar
  active: true
- name: Transmission Committee
  short: TC
  url: https://www.iso-ne.com/committees/transmission/transmission-committee/calendar
  active: true
- name: Load Forecast Committee
  short: LFC
  url: https://www.iso-ne.com/committees/reliability/load-forecast/calendar
  active: true
- name: Power Supply Planning Committee
  short: PSPC
  url: https://www.iso-ne.com/committees/reliability/power-supply-planning/calendar
  active: true
- name: Budget and Finance Subcommittee
  short: BFS
  url: https://www.iso-ne.com/committees/participants/budget-finance/calendar
  active: true
- name: Planning Advisory Committee
  short: PAC
  url: https://www.iso-ne.com/committees/planning/planning-advisory/calendar
  active: true

npc_combined:
  # Section types to mark as ignored (stored but not summarized)
  skip_section_types:
  - minutes
  - notice
  # Combined PDF selection priority (first found wins)
  pdf_priority:
  - composite
  - supplemental
  - initial

agenda_parsing:
  mode: llm_verify
  parse_model: claude-haiku-4-5-20251001
  match_model: claude-haiku-4-5-20251001
  escalation_model: claude-sonnet-4-6

ferc:
  # Per-documentClass treatment tiers for docket filings. Classes not listed
  # anywhere default to 'brief' so new FERC classes are never silently
  # dropped. Full taxonomy: elibrary.ferc.gov/eLibrary/assets/class-type.pdf
  # (defaults live in pipeline/docket_ingest.py DEFAULT_TREATMENT_MAP; list a
  # tier here to override that tier wholesale).
  # treatment_map:
  #   skip: [Intervention, Notice, Transcript]
  # Context guards for the per-filing LLM call:
  max_chars_per_file: 150000
  max_chars_per_filing: 400000
  # Sync fan-out: how many filings enrich/summarize at once (clamped 1..8).
  # Each worker paces its own eLibrary client, so the aggregate request
  # rate stays ~workers/2s. FERC's own SPA fires concurrent calls.
  parallel_workers: 4

summarization:
  # When true, the refresh cron auto-runs an item-scoped re-summarize as new
  # documents land on an already-summarized meeting (unattended LLM spend).
  # When false (default), a materials_new notification is raised instead.
  auto_resummarize: false
  # L1/L2 fan-out width for summarize runs — how many agenda items' LLM
  # calls run at once. 1 = sequential; clamped to 1..8 in code. Level 3
  # (the briefing) is always a single call.
  parallel_workers: 3
  # Models + token budgets live in prompts/model_config.json (editable in
  # the UI, stored as a DB override — see pipeline/appconfig.py).
  images:
    enabled: true
    min_size_px: 200
    max_per_item: 8
    extract_from:
    - .pdf
    - .pptx
